<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-key="reset_password_title">تعيين كلمة مرور جديدة</title>
  <link rel="stylesheet" href="css/login.css">
  <link href="https://fonts.googleapis.com/css2?family=Gumela&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/login-config.js"></script>
</head>
<body>
  <div class="language">
    <button onclick="toggleLangMenu()">🌐</button>
    <ul class="lang-menu" id="languageMenu">
      <li onclick="setLanguage('ar')">🇩🇿 العربية</li>
      <li onclick="setLanguage('fr')">🇫🇷 Français</li>
      <li onclick="setLanguage('en')">🇺🇸 English</li>
    </ul>
  </div>

  <div class="auth-box" id="resetBox">
    <h2 data-key="reset_password_title">تعيين كلمة مرور جديدة</h2>
    <p data-key="reset_desc" style="text-align: center; color: var(--text-secondary); margin-bottom: 20px; font-size: 14px;">
      أدخل كلمة المرور الجديدة لحسابك
    </p>
    
    <div class="form-group">
      <label for="new-password" data-key="new_password_label">كلمة المرور الجديدة</label>
      <input type="password" id="new-password" data-key="new_password_placeholder" placeholder="أدخل كلمة المرور الجديدة" />
    </div>
    
    <div class="form-group">
      <label for="confirm-password" data-key="confirm_password_label">تأكيد كلمة المرور</label>
      <input type="password" id="confirm-password" data-key="confirm_password_placeholder" placeholder="أعد إدخال كلمة المرور" />
    </div>
    
    <button id="updatePasswordBtn" data-key="update_password_btn">تحديث كلمة المرور</button>
    
    <div class="error-message" id="errorMessage" style="display: none;"></div>
    <div class="success-message" id="successMessage" style="display: none;"></div>
    
    <button id="backToLoginBtn" data-key="back_to_login" onclick="window.location.href='login.html'" style="margin-top: 15px; background: transparent; color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.1);">
      العودة لتسجيل الدخول
    </button>
  </div>

  <script src="js/auth.js"></script>           
  <script src="js/reset-password.js"></script>          
</body>
</html>
