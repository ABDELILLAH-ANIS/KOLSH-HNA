<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="كلش هنا - عقارات للبيع والإيجار في الجزائر. شقق، فيلات، أراضي وعقارات تجارية." />
  <meta name="keywords" content="عقارات جزائر, شقق للبيع, شقق للإيجار, عقارات الجزائر, كلش هنا عقارات" />
  <meta property="og:title" content="كلش هنا - عقارات" />
  <meta property="og:type" content="website" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co;" />
  <title>كلش هنا - العقارات</title>
  <link href="https://fonts.googleapis.com/css2?family=Gumela&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/css_main.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/security.js"></script>
  <script src="js/translations.js"></script>
  <style>
    /* ─── Real Estate Page Styles ─── */
    :root {
      --re-gold: #fdcb6e;
      --re-green: #00ffc3;
      --bg-dark: #0d1117;
      --bg-card: #161b22;
      --border: rgba(255,255,255,0.08);
    }
    body {
      background: var(--bg-dark);
      color: #e6edf3;
      font-family: 'Gumela', 'Inter', sans-serif;
      margin: 0; padding: 0;
      min-height: 100vh;
    }

    /* ─── Page Header ─── */
    .re-page-header {
      background: linear-gradient(135deg, #0d1117, #161b22);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(20px);
    }
    .re-page-header .logo-area {
      display: flex; align-items: center; gap: 12px;
    }
    .re-page-header .logo-area img { height: 40px; }
    .re-page-header .page-title {
      font-size: 20px; font-weight: 700; color: white;
    }
    .re-page-header .header-back {
      display: flex; align-items: center; gap: 8px;
      color: var(--re-green); text-decoration: none;
      font-size: 14px; font-weight: 600;
      transition: opacity 0.2s;
    }
    .re-page-header .header-back:hover { opacity: 0.7; }

    /* ─── Hero Banner ─── */
    .re-hero {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 60px 24px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    .re-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(253,203,110,0.08) 0%, transparent 70%);
    }
    .re-hero h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700; color: white;
      margin-bottom: 12px; position: relative;
    }
    .re-hero h1 span { color: var(--re-gold); }
    .re-hero p {
      font-size: 16px; color: rgba(255,255,255,0.6);
      max-width: 500px; margin: 0 auto; position: relative;
    }

    /* ─── Layout ─── */
    .re-layout {
      display: flex; gap: 24px;
      max-width: 1400px; margin: 32px auto;
      padding: 0 24px; align-items: flex-start;
    }

    /* ─── Filters Sidebar ─── */
    .re-filters {
      width: 280px; flex-shrink: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 24px;
      position: sticky; top: 80px;
    }
    .filter-title {
      font-size: 16px; font-weight: 700; color: white;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }
    .filter-title i { color: var(--re-gold); }
    .filter-group { margin-bottom: 20px; }
    .filter-label {
      font-size: 12px; color: rgba(255,255,255,0.5);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 8px; display: block;
    }
    .filter-group input {
      width: 100%; padding: 10px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px; color: white;
      font-family: inherit; font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .filter-group select {
      width: 100%; padding: 10px 12px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px; color: #111111;
      font-family: inherit; font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .filter-group select:focus, .filter-group input:focus {
      border-color: var(--re-green);
    }
    .filter-group select option { background: #fff; color: #111; }
    .filter-group select option:checked { background: #f0f0f0; }
    .price-range { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .filter-btn {
      width: 100%;
      background: var(--re-gold);
      color: #000; border: none;
      padding: 12px; border-radius: 8px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover { box-shadow: 0 4px 20px rgba(253,203,110,0.3); transform: translateY(-1px); }
    .filter-reset {
      width: 100%; background: transparent;
      border: 1px solid var(--border);
      color: rgba(255,255,255,0.5); padding: 10px;
      border-radius: 8px; font-family: inherit;
      font-size: 13px; cursor: pointer;
      margin-top: 8px; transition: all 0.2s;
    }
    .filter-reset:hover { border-color: rgba(255,255,255,0.3); color: white; }

    /* ─── Results Area ─── */
    .re-results { flex: 1; min-width: 0; }
    .re-results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .re-count { font-size: 15px; color: rgba(255,255,255,0.6); }
    .re-count strong { color: var(--re-green); }
    .re-sort-select {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px; color: #111111;
      padding: 8px 12px; font-family: inherit; font-size: 13px;
      outline: none;
    }
    .re-sort-select option { background: #fff; color: #111; }
    /* ── All select options: black text on white bg ── */
    select option { background: #fff !important; color: #111 !important; }

    /* ─── Grid ─── */
    .re-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    /* ─── Listing Card ─── */
    .re-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      transition: all 0.25s ease;
      cursor: pointer;
      position: relative;
    }
    .re-card:hover {
      transform: translateY(-6px);
      border-color: rgba(253,203,110,0.4);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }
    .re-card-img {
      height: 200px;
      background-size: cover; background-position: center;
      background-color: rgba(255,255,255,0.05);
      position: relative;
    }
    .re-card-img .no-img {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; opacity: 0.3;
    }
    .re-type-badge {
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,0.75);
      color: var(--re-gold);
      padding: 5px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 700;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(253,203,110,0.3);
    }
    .re-featured-badge {
      position: absolute; top: 12px; left: 12px;
      background: linear-gradient(135deg, #fdcb6e, #e17055);
      color: white; padding: 4px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .re-card-body { padding: 18px; }
    .re-card-title {
      font-size: 16px; font-weight: 700; color: white;
      margin-bottom: 10px; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .re-card-meta {
      display: flex; flex-wrap: wrap; gap: 10px;
      font-size: 12px; color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }
    .re-card-meta span { display: flex; align-items: center; gap: 4px; }
    .re-card-price {
      font-size: 20px; font-weight: 700;
      color: var(--re-gold); margin-bottom: 14px;
    }
    .re-card-price small {
      font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 400;
    }
    .re-card-actions { display: flex; gap: 8px; }
    .re-wa-btn {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 10px;
      background: rgba(37,211,102,0.12);
      border: 1px solid rgba(37,211,102,0.3);
      border-radius: 8px; color: #25d366;
      text-decoration: none; font-size: 13px; font-weight: 600;
      transition: all 0.2s;
    }
    .re-wa-btn:hover { background: rgba(37,211,102,0.2); }
    .re-detail-btn {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 10px;
      background: rgba(253,203,110,0.1);
      border: 1px solid rgba(253,203,110,0.25);
      border-radius: 8px; color: var(--re-gold);
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      font-family: inherit;
    }
    .re-detail-btn:hover { background: rgba(253,203,110,0.2); }

    /* ─── Empty / Loading ─── */
    .re-empty {
      grid-column: 1/-1; text-align: center;
      padding: 80px 20px; color: rgba(255,255,255,0.4);
    }
    .re-empty i { font-size: 64px; margin-bottom: 16px; display: block; }
    .re-empty h3 { font-size: 20px; margin-bottom: 8px; color: rgba(255,255,255,0.6); }
    .re-skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: skeletonShimmer 1.5s infinite;
      border-radius: 16px; height: 320px;
    }

    /* ─── Pagination ─── */
    .re-pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 8px; margin-top: 16px;
    }
    .re-page-btn {
      padding: 10px 18px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; color: white;
      cursor: pointer; font-family: inherit; font-size: 14px;
      transition: all 0.2s;
    }
    .re-page-btn:hover:not(:disabled) { border-color: var(--re-gold); color: var(--re-gold); }
    .re-page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .re-page-info { font-size: 14px; color: rgba(255,255,255,0.5); }

    /* ─── Detail Modal ─── */
    .re-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); z-index: 9998;
      backdrop-filter: blur(8px);
    }
    .re-modal-overlay.active { display: flex; align-items: center; justify-content: center; padding: 20px; }
    .re-modal {
      background: linear-gradient(145deg, #1a1f2e, #13161e);
      border: 1px solid rgba(253,203,110,0.3);
      border-radius: 20px; padding: 32px;
      max-width: 640px; width: 100%;
      max-height: 90vh; overflow-y: auto;
      position: relative;
      animation: fadeInUp 0.3s ease;
    }
    .re-modal h2 { font-size: 22px; color: white; margin-bottom: 16px; }
    .re-modal .close-re-modal {
      position: absolute; top: 20px; left: 20px;
      background: rgba(255,255,255,0.08); border: none;
      border-radius: 50%; width: 36px; height: 36px;
      color: white; cursor: pointer; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .re-modal-imgs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .re-modal-imgs .re-modal-img {
      width: 100%; height: 240px; object-fit: cover;
      border-radius: 12px; border: 1px solid var(--border);
    }
    .re-modal-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-bottom: 20px;
    }
    .re-modal-field { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 12px; }
    .re-modal-field label { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.8px; display: block; margin-bottom: 4px; }
    .re-modal-field span { font-size: 15px; color: white; font-weight: 600; }
    .re-modal-desc { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.8; margin-bottom: 20px; }
    .re-modal-actions { display: flex; gap: 12px; }

    /* ─── Responsive ─── */
    @media (max-width: 900px) {
      .re-layout { flex-direction: column; }
      .re-filters { width: 100%; position: static; }
    }
    @media (max-width: 600px) {
      .re-hero { padding: 40px 16px; }
      .re-layout { padding: 0 12px; }
      .re-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    }
    @media (max-width: 400px) {
      .re-grid { grid-template-columns: 1fr; }
    }

    /* ─── Language Menu Custom Styles ─── */
    .lang-menu {
      display: none;
      position: absolute;
      top: 105%;
      left: 0;
      background: rgba(20,24,20,0.95);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px;
      list-style: none;
      min-width: 140px;
      z-index: 200;
    }
    .lang-menu.show {
      display: block !important;
    }
    .lang-menu li {
      padding: 8px 12px;
      cursor: pointer;
      color: white;
      transition: background 0.2s;
      border-radius: 4px;
      text-align: right;
    }
    .lang-menu li:hover {
      background: rgba(255,255,255,0.08);
    }
    /* direction adjustment for menu items */
    .ltr .lang-menu li {
      text-align: left;
    }
  </style>
</head>
<body>

  <!-- ─── Page Header ─── -->
  <header class="re-page-header">
    <div class="logo-area">
      <img src="images/logo.png" alt="كلش هنا" onerror="this.style.display='none'">
      <h1 class="page-title" data-key="realEstateTitleHeader">🏠 العقارات</h1>
    </div>
    <div class="header-actions" style="display:flex; align-items:center; gap:16px;">
      <!-- زر اللغة -->
      <div class="language-dropdown" style="position:relative;">
        <button class="lang-btn" onclick="event.stopPropagation(); document.getElementById('languageMenu').classList.toggle('show');" aria-label="LanguageMenu" style="background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); color:white; font-size:16px; padding:8px 12px; border-radius:8px; cursor:pointer; font-family:'Gumela',sans-serif; display:flex; align-items:center; justify-content:center;">
          🌐
        </button>
        <ul id="languageMenu" class="lang-menu">
        </ul>
      </div>

      <a href="index.html" class="header-back" id="backBtn" data-key="back_to_home_btn">
        <i class="fas fa-arrow-left"></i>
        <span data-key="back_to_home">العودة للرئيسية</span>
      </a>
      <button onclick="openPublishForm()" style="background:linear-gradient(135deg,#fdcb6e,#e17055); color:#000; border:none; padding:10px 18px; border-radius:10px; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:6px;">
        <i class="fas fa-plus"></i> أضف إعلانك
      </button>
    </div>
  </header>

  <!-- ─── Hero ─── -->
  <section class="re-hero">
    <h1 data-key="realEstateTitle">عقارات للبيع و<span>الإيجار</span></h1>
    <p data-key="realEstateSubtitle">اكتشف أفضل العقارات في الجزائر — شقق، فيلات، أراضي وعقارات تجارية</p>
  </section>

  <!-- ─── Main Layout ─── -->
  <div class="re-layout">

    <!-- ─── Filters Sidebar ─── -->
    <aside class="re-filters">
      <div class="filter-title" data-key="filterResults"><i class="fas fa-sliders-h"></i> تصفية النتائج</div>

      <div class="filter-group">
        <label class="filter-label" data-key="offerType">نوع العرض</label>
        <select id="filterType">
          <option value="" data-key="all">الكل</option>
          <option value="sale" data-key="sale">للبيع</option>
          <option value="rent" data-key="rent">للإيجار</option>
          <option value="vacation" data-key="vacation">للاصطياف</option>
          <option value="commercial" data-key="commercial">تجاري</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label" data-key="propertyType">نوع العقار</label>
        <select id="filterPropType">
          <option value="" data-key="all">الكل</option>
          <option value="apartment" data-key="apartment">شقة</option>
          <option value="villa" data-key="villa">فيلا</option>
          <option value="land" data-key="land">أرض</option>
          <option value="commercial" data-key="propCommercial">محل تجاري</option>
          <option value="office" data-key="office">مكتب</option>
          <option value="studio" data-key="studio">استوديو</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label" data-key="wilaya">الولاية</label>
        <select id="filterWilaya">
          <option value="" data-key="allWilayas">كل الولايات</option>
          <option value="16">الجزائر العاصمة</option>
          <option value="31">وهران</option>
          <option value="25">قسنطينة</option>
          <option value="9">البليدة</option>
          <option value="19">سطيف</option>
          <option value="6">بجاية</option>
          <option value="15">تيزي وزو</option>
          <option value="34">بومرداس</option>
          <option value="35">الطارف</option>
          <option value="42">تيبازة</option>
          <option value="44">مستغانم</option>
          <option value="5">باتنة</option>
          <option value="26">مدية</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label" data-key="roomsCount">عدد الغرف</label>
        <select id="filterRooms">
          <option value="" data-key="anyCount">أي عدد</option>
          <option value="1" data-key="oneRoom">1 غرفة</option>
          <option value="2" data-key="twoRooms">2 غرف</option>
          <option value="3" data-key="threeRooms">3 غرف</option>
          <option value="4" data-key="fourRooms">4 غرف</option>
          <option value="5" data-key="fiveRooms">5 غرف فأكثر</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label" data-key="priceRange">نطاق السعر (DA)</label>
        <div class="price-range">
          <input type="number" id="filterPriceMin" data-key="priceMin" placeholder="الأدنى" min="0" step="500000">
          <input type="number" id="filterPriceMax" data-key="priceMax" placeholder="الأعلى" min="0" step="500000">
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label" data-key="area">المساحة (م²)</label>
        <div class="price-range">
          <input type="number" id="filterAreaMin" data-key="areaMin" placeholder="الأدنى" min="0">
          <input type="number" id="filterAreaMax" data-key="areaMax" placeholder="الأعلى" min="0">
        </div>
      </div>

      <button class="filter-btn" onclick="applyFilters()" data-key="searchBtn">
        <i class="fas fa-search"></i> بحث
      </button>
      <button class="filter-reset" onclick="resetFilters()" data-key="resetBtn">
        <i class="fas fa-undo"></i> إعادة ضبط
      </button>
    </aside>

    <!-- ─── Results ─── -->
    <main class="re-results">
      <div class="re-results-header">
        <div class="re-count" id="reCount">
          <span id="reCountNum">—</span> <span data-key="availableListings">عقار متاح</span>
        </div>
        <select class="re-sort-select" id="reSort" onchange="sortListings()">
          <option value="featured" data-key="sortFeatured">المميزة أولاً</option>
          <option value="newest" data-key="sortNewest">الأحدث أولاً</option>
          <option value="price_asc" data-key="sortPriceAsc">السعر: الأقل أولاً</option>
          <option value="price_desc" data-key="sortPriceDesc">السعر: الأعلى أولاً</option>
          <option value="area_desc" data-key="sortAreaDesc">المساحة: الأكبر أولاً</option>
        </select>
      </div>

      <!-- ─── Results Grid ─── -->
      <div class="re-grid" id="reGrid">
        <!-- Skeleton loaders -->
        <div class="re-skeleton"></div>
        <div class="re-skeleton"></div>
        <div class="re-skeleton"></div>
        <div class="re-skeleton"></div>
      </div>

      <!-- ─── Pagination ─── -->
      <div class="re-pagination" id="rePagination" style="display:none;">
        <button class="re-page-btn" id="rePrevBtn" onclick="changePage(-1)">&#8592; السابق</button>
        <span class="re-page-info" id="rePageInfo">صفحة 1 من 1</span>
        <button class="re-page-btn" id="reNextBtn" onclick="changePage(1)">التالي &#8594;</button>
      </div>
    </main>
  </div><!-- /.re-layout -->

  <!-- ─── كل الكود البرمجي هنا خارج re-grid ─── -->
  <script>
  // ─── Constants ───────────────────────────────────────────────
  const PAGE_SIZE = 12;

  const WILAYAS = {
    1:'أدرار', 2:'الشلف', 3:'الأغواط', 4:'أم البواقي', 5:'باتنة',
    6:'بجاية', 7:'بسكرة', 8:'بشار', 9:'البليدة', 10:'البويرة',
    11:'تمنراست', 12:'تبسة', 13:'تلمسان', 14:'تيارت', 15:'تيزي وزو',
    16:'الجزائر', 17:'الجلفة', 18:'جيجل', 19:'سطيف', 20:'سعيدة',
    21:'سكيكدة', 22:'سيدي بلعباس', 23:'عنابة', 24:'قالمة', 25:'قسنطينة',
    26:'مدية', 27:'مسيلة', 28:'معسكر', 29:'ورقلة', 30:'وهران',
    31:'البيض', 32:'إليزي', 33:'برج بوعريريج', 34:'بومرداس', 35:'الطارف',
    36:'تندوف', 37:'تيسمسيلت', 38:'الوادي', 39:'خنشلة', 40:'سوق أهراس',
    41:'تيبازة', 42:'ميلة', 43:'عين الدفلى', 44:'النعامة', 45:'عين تيموشنت',
    46:'غرداية', 47:'غليزان', 48:'تيميمون', 49:'برج باجي مختار', 50:'أولاد جلال',
    51:'بني عباس', 52:'إن صالح', 53:'إن قزام', 54:'توقرت', 55:'جانت',
    56:'المغير', 57:'المنيعة', 58:'تنزروفت'
  };

  // ─── State ────────────────────────────────────────────────────
  let allListings = [];
  let filteredListings = [];
  let currentPage = 1;

  // ─── Load Listings ────────────────────────────────────────────
  async function loadListings() {
    const supabase = window.getSupabaseClient();
    if (!supabase) {
      document.getElementById('reGrid').innerHTML = '<div class="re-empty"><i class="fas fa-exclamation-triangle"></i><h3>تعذر الاتصال بقاعدة البيانات</h3></div>';
      return;
    }
    try {
      const { data, error } = await supabase
        .from('real_estate_listings')
        .select('*')
        .eq('is_available', true)
        .order('is_featured', { ascending: false })
        .order('created_at', { ascending: false });
      if (error) throw error;
      allListings = data || [];
      filteredListings = [...allListings];
      renderListings();
      updateCount();
    } catch (err) {
      console.warn('[RealEstate] Load error:', err);
      document.getElementById('reGrid').innerHTML = '<div class="re-empty"><i class="fas fa-home"></i><h3>لا توجد عقارات متاحة حالياً</h3></div>';
    }
  }

  // ─── Render ───────────────────────────────────────────────────
  function renderListings() {
    const grid = document.getElementById('reGrid');
    const start = (currentPage - 1) * PAGE_SIZE;
    const page = filteredListings.slice(start, start + PAGE_SIZE);
    const escFn = window.KH_Security ? KH_Security.escapeHtml : s => String(s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));

    if (!page.length) {
      grid.innerHTML = '<div class="re-empty"><i class="fas fa-search"></i><h3>لا توجد نتائج</h3></div>';
      updatePagination();
      return;
    }

    grid.innerHTML = page.map(listing => {
      const img = (listing.images && listing.images[0]) || '';
      const wilayaName = WILAYAS[listing.wilaya] || `ولاية ${listing.wilaya}`;
      const listingType = window.t ? (window.t(listing.listing_type) || listing.listing_type || '') : (listing.listing_type || '');
      const propType = listing.property_type === 'commercial' ? (window.t ? window.t('propCommercial') : 'محل تجاري') : (window.t ? (window.t(listing.property_type) || listing.property_type || '') : (listing.property_type || ''));
      const price = listing.price
        ? (window.translateCurrency ? window.translateCurrency(listing.price, 'DZD') : listing.price.toLocaleString('ar-DZ') + ' DA')
        : (window.t ? window.t('priceNegotiable') : 'قابل للتفاوض');
      const priceNote = listing.listing_type === 'rent' ? `<small>${window.t ? window.t('perMonth') : '/شهر'}</small>` : '';
      const wa = listing.contact_whatsapp || listing.contact_phone || '';
      const waNum = wa.replace(/\D/g,'').replace(/^0/,'213');
      const waUrl = `https://wa.me/${waNum}?text=${encodeURIComponent(`مرحباً، أنا مهتم بعقار "${listing.title || ''}"`)}`; 
      const featuredBadge = listing.is_featured ? `<span class="re-featured-badge">${window.t ? window.t('featured') : 'مميز'}</span>` : '';
      const waText = window.t ? window.t('contactWhatsapp') : 'واتساب';
      const detailsText = window.t ? window.t('details') : 'التفاصيل';

      return `
        <article class="re-card" onclick="openListingDetail(${listing.id})">
          <div class="re-card-img" style="${img ? `background-image:url('${escFn(img)}')` : ''}">
            ${!img ? '<div class="no-img">🏠</div>' : ''}
            <span class="re-type-badge">${escFn(listingType)}</span>
            ${featuredBadge}
          </div>
          <div class="re-card-body">
            <h3 class="re-card-title">${escFn(listing.title || 'عقار')}</h3>
            <div class="re-card-meta">
              <span><i class="fas fa-map-marker-alt"></i> ${escFn(wilayaName)}${listing.commune ? ', ' + escFn(listing.commune) : ''}</span>
              ${propType ? `<span><i class="fas fa-building"></i> ${escFn(propType)}</span>` : ''}
              ${listing.area_m2 ? `<span><i class="fas fa-ruler-combined"></i> ${listing.area_m2.toLocaleString()} م²</span>` : ''}
              ${listing.rooms ? `<span><i class="fas fa-bed"></i> ${listing.rooms} غرف</span>` : ''}
            </div>
            <div class="re-card-price">${price}${priceNote}</div>
            <div class="re-card-actions" onclick="event.stopPropagation()">
              ${wa ? `<a class="re-wa-btn" href="${waUrl}" target="_blank" rel="noopener"><i class="fab fa-whatsapp"></i> ${escFn(waText)}</a>` : ''}
              <button class="re-detail-btn" onclick="openListingDetail(${listing.id})">
                <i class="fas fa-eye"></i> ${escFn(detailsText)}
              </button>
            </div>
          </div>
        </article>`;
    }).join('');

    updatePagination();
  }

  // ─── Detail Modal ─────────────────────────────────────────────
  function openListingDetail(id) {
    const listing = allListings.find(l => l.id === id);
    if (!listing) return;
    const escFn = window.KH_Security ? KH_Security.escapeHtml : s => String(s || '');
    const imgs = listing.images || [];
    const wilayaName = WILAYAS[listing.wilaya] || `ولاية ${listing.wilaya}`;
    const listingType = window.t ? (window.t(listing.listing_type) || listing.listing_type || '—') : (listing.listing_type || '—');
    const propType = listing.property_type === 'commercial' ? (window.t ? window.t('propCommercial') : 'محل تجاري') : (window.t ? (window.t(listing.property_type) || listing.property_type || '—') : (listing.property_type || '—'));
    const price = listing.price ? (window.translateCurrency ? window.translateCurrency(listing.price, 'DZD') : listing.price.toLocaleString('ar-DZ') + ' DA') : (window.t ? window.t('priceNegotiable') : 'قابل للتفاوض');
    const wa = listing.contact_whatsapp || listing.contact_phone || '';
    const waNum = wa.replace(/\D/g,'').replace(/^0/,'213');
    const waUrl = wa ? `https://wa.me/${waNum}?text=${encodeURIComponent(`مرحباً، أنا مهتم بعقار "${listing.title || ''}"`)}` : '#';

    document.getElementById('reModalContent').innerHTML = `
      <h2>${escFn(listing.title || 'عقار')}</h2>
      ${imgs.length ? `
        <div class="re-modal-imgs">
          ${imgs.slice(0, 5).map((img, i) => `<img class="re-modal-img" src="${escFn(img)}" alt="${escFn(listing.title)} صورة ${i+1}" loading="lazy" onerror="this.style.display='none'" style="${i>0?'max-height:110px;object-fit:cover;':'max-height:260px;object-fit:cover;'} width:100%; border-radius:${i>0?'8px':'10px 10px 0 0'};">`).join('')}
        </div>` : `<div style="height:160px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.04); border-radius:10px; font-size:56px; opacity:0.3; margin-bottom:16px;">🏠</div>`}
      <div class="re-modal-grid">
        <div class="re-modal-field"><label>نوع العرض</label><span>${escFn(listingType)}</span></div>
        <div class="re-modal-field"><label>نوع العقار</label><span>${escFn(propType)}</span></div>
        <div class="re-modal-field"><label>الولاية</label><span>${escFn(wilayaName)}${listing.commune ? ', ' + escFn(listing.commune) : ''}</span></div>
        <div class="re-modal-field"><label>السعر</label><span style="color:var(--re-gold)">${price}</span></div>
        ${listing.area_m2 ? `<div class="re-modal-field"><label>المساحة</label><span>${listing.area_m2.toLocaleString()} م²</span></div>` : ''}
        ${listing.rooms ? `<div class="re-modal-field"><label>عدد الغرف</label><span>${listing.rooms}</span></div>` : ''}
        ${listing.bathrooms ? `<div class="re-modal-field"><label>الحمامات</label><span>${listing.bathrooms}</span></div>` : ''}
        ${listing.floor != null ? `<div class="re-modal-field"><label>الطابق</label><span>${listing.floor}</span></div>` : ''}
        ${listing.has_parking != null ? `<div class="re-modal-field"><label>موقف سيارة</label><span>${listing.has_parking ? 'نعم' : 'لا'}</span></div>` : ''}
      </div>
      ${listing.description ? `<div class="re-modal-desc">${escFn(listing.description)}</div>` : ''}
      <div class="re-modal-actions">
        ${wa ? `<a href="${waUrl}" target="_blank" rel="noopener" style="flex:1;padding:14px;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(37,211,102,0.12);border:1px solid rgba(37,211,102,0.3);border-radius:10px;color:#25d366;font-weight:700;"><i class="fab fa-whatsapp"></i> واتساب</a>` : ''}
        ${listing.contact_phone ? `<a href="tel:${listing.contact_phone}" style="flex:1;padding:14px;display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:white;font-weight:600;"><i class="fas fa-phone"></i> اتصال</a>` : ''}
      </div>`;

    document.getElementById('reModalOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeReModal(event) {
    const overlay = document.getElementById('reModalOverlay');
    if (event && event.target !== overlay) return;
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  // ─── Filters ──────────────────────────────────────────────────
  function applyFilters() {
    const type = document.getElementById('filterType').value;
    const propType = document.getElementById('filterPropType').value;
    const wilaya = document.getElementById('filterWilaya').value;
    const rooms = document.getElementById('filterRooms').value;
    const priceMin = parseFloat(document.getElementById('filterPriceMin').value) || 0;
    const priceMax = parseFloat(document.getElementById('filterPriceMax').value) || Infinity;
    const areaMin = parseFloat(document.getElementById('filterAreaMin').value) || 0;
    const areaMax = parseFloat(document.getElementById('filterAreaMax').value) || Infinity;

    filteredListings = allListings.filter(l => {
      if (type && l.listing_type !== type) return false;
      if (propType && l.property_type !== propType) return false;
      if (wilaya && String(l.wilaya) !== wilaya) return false;
      if (rooms) {
        if (rooms === '5' && (l.rooms || 0) < 5) return false;
        else if (rooms !== '5' && l.rooms && l.rooms !== parseInt(rooms)) return false;
      }
      if (l.price !== null && l.price !== undefined) {
        if (l.price < priceMin || l.price > priceMax) return false;
      }
      if (l.area_m2 !== null && l.area_m2 !== undefined) {
        if (l.area_m2 < areaMin || l.area_m2 > areaMax) return false;
      }
      return true;
    });
    currentPage = 1;
    renderListings();
    updateCount();
  }

  function resetFilters() {
    ['filterType','filterPropType','filterWilaya','filterRooms'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    ['filterPriceMin','filterPriceMax','filterAreaMin','filterAreaMax'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    filteredListings = [...allListings];
    currentPage = 1;
    renderListings();
    updateCount();
  }

  function sortListings() {
    const sort = document.getElementById('reSort').value;
    const sorted = [...filteredListings];
    switch (sort) {
      case 'newest': sorted.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)); break;
      case 'price_asc': sorted.sort((a,b) => (a.price || 0) - (b.price || 0)); break;
      case 'price_desc': sorted.sort((a,b) => (b.price || 0) - (a.price || 0)); break;
      case 'area_desc': sorted.sort((a,b) => (b.area_m2 || 0) - (a.area_m2 || 0)); break;
      case 'featured': default:
        sorted.sort((a,b) => (b.is_featured ? 1 : 0) - (a.is_featured ? 1 : 0));
    }
    filteredListings = sorted;
    currentPage = 1;
    renderListings();
  }

  // ─── Pagination ───────────────────────────────────────────────
  function changePage(dir) {
    const totalPages = Math.ceil(filteredListings.length / PAGE_SIZE) || 1;
    currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
    renderListings();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function updatePagination() {
    const totalPages = Math.ceil(filteredListings.length / PAGE_SIZE) || 1;
    const paginationEl = document.getElementById('rePagination');
    const pageInfoEl = document.getElementById('rePageInfo');
    const prevBtn = document.getElementById('rePrevBtn');
    const nextBtn = document.getElementById('reNextBtn');
    if (!pageInfoEl) return;
    pageInfoEl.textContent = `صفحة ${currentPage} من ${totalPages}`;
    if (prevBtn) prevBtn.disabled = currentPage <= 1;
    if (nextBtn) nextBtn.disabled = currentPage >= totalPages;
    if (paginationEl) paginationEl.style.display = totalPages > 1 ? 'flex' : 'none';
  }

  function updateCount() {
    const el = document.getElementById('reCountNum');
    if (el) el.textContent = filteredListings.length;
  }

  // ─── Publish Form ─────────────────────────────────────────────
  function openPublishForm() {
    const overlay = document.getElementById('publishOverlay');
    if (!overlay) { console.error('publishOverlay not found'); return; }
    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    // Reset message
    const msg = document.getElementById('publishMsg');
    if (msg) msg.style.display = 'none';
  }

  function closePublishForm() {
    const overlay = document.getElementById('publishOverlay');
    if (overlay) overlay.style.display = 'none';
    document.body.style.overflow = '';
  }

  function handleImgPreview(input) {
    const files = Array.from(input.files).slice(0, 5);
    const preview = document.getElementById('pub_img_preview');
    const labelSpan = document.querySelector('#pub_img_label span');
    if (!preview) return;
    preview.innerHTML = '';
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        const div = document.createElement('div');
        div.style.cssText = 'position:relative; width:76px; height:76px; border-radius:8px; overflow:hidden; border:2px solid rgba(253,203,110,0.5); flex-shrink:0;';
        const img = document.createElement('img');
        img.src = e.target.result;
        img.style.cssText = 'width:100%; height:100%; object-fit:cover;';
        div.appendChild(img);
        preview.appendChild(div);
      };
      reader.readAsDataURL(file);
    });
    if (labelSpan) labelSpan.textContent = `${files.length} صورة محددة — اضغط لتغيير`;
  }

  async function uploadListingImages(supabase, files) {
    const urls = [];
    for (const file of Array.from(files).slice(0, 5)) {
      if (file.size > 5 * 1024 * 1024) { console.warn('[Upload] File too large:', file.name); continue; }
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['jpg','jpeg','png','webp'].includes(ext)) continue;
      const path = `listings/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      try {
        const { error: uploadErr } = await supabase.storage
          .from('real-estate-images')
          .upload(path, file, { contentType: file.type, upsert: false });
        if (uploadErr) { console.warn('[Upload] Error:', uploadErr.message); continue; }
        const { data: urlData } = supabase.storage.from('real-estate-images').getPublicUrl(path);
        if (urlData && urlData.publicUrl) urls.push(urlData.publicUrl);
      } catch (e) {
        console.warn('[Upload] Exception:', e);
      }
    }
    return urls;
  }

  async function submitPublishForm(event) {
    event.preventDefault();
    const btn = document.getElementById('pub_btn');
    const supabase = window.getSupabaseClient();
    if (!supabase) { showPublishMsg('تعذر الاتصال بقاعدة البيانات. حاول مجدداً.', 'error'); return; }

    const phone = document.getElementById('pub_phone').value.trim();
    const title = document.getElementById('pub_title').value.trim();
    const wilayaVal = document.getElementById('pub_wilaya').value;
    const wilaya = parseInt(wilayaVal);
    const imageFilesInput = document.getElementById('pub_images');
    const imageFiles = imageFilesInput ? Array.from(imageFilesInput.files) : [];

    if (!phone || phone.replace(/\D/g,'').length < 9) { showPublishMsg('أدخل رقم هاتف صحيح (9 أرقام على الأقل)', 'error'); return; }
    if (!title) { showPublishMsg('أدخل عنوان الإعلان', 'error'); return; }
    if (!wilaya || isNaN(wilaya)) { showPublishMsg('اختر الولاية', 'error'); return; }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري المعالجة...';

    const formattedPhone = phone.replace(/\D/g,'').replace(/^0/, '213');

    try {
      // رفع الصور إن وجدت
      let imageUrls = [];
      if (imageFiles.length > 0) {
        showPublishMsg('⏳ جاري رفع الصور...', 'info');
        imageUrls = await uploadListingImages(supabase, imageFiles);
      }

      showPublishMsg('⏳ جاري نشر الإعلان...', 'info');

      const { error } = await supabase.from('real_estate_listings').insert({
        title,
        listing_type: document.getElementById('pub_type').value,
        property_type: document.getElementById('pub_proptype').value,
        wilaya,
        commune: document.getElementById('pub_city').value.trim() || null,
        price: parseFloat(document.getElementById('pub_price').value) || null,
        area_m2: parseFloat(document.getElementById('pub_area').value) || null,
        rooms: parseInt(document.getElementById('pub_rooms').value) || null,
        description: document.getElementById('pub_desc').value.trim() || null,
        contact_phone: phone,
        contact_whatsapp: formattedPhone,
        images: imageUrls.length > 0 ? imageUrls : null,
        is_available: true,
        is_featured: false,
        created_at: new Date().toISOString()
      });

      if (error) throw error;

      const imgNote = imageUrls.length > 0 ? ` مع ${imageUrls.length} صورة` : '';
      showPublishMsg(`✅ تم نشر إعلانك بنجاح${imgNote}! سيظهر في القائمة الآن.`, 'success');
      document.getElementById('publishForm').reset();
      const preview = document.getElementById('pub_img_preview');
      if (preview) preview.innerHTML = '';
      const labelSpan = document.querySelector('#pub_img_label span');
      if (labelSpan) labelSpan.textContent = 'اضغط لرفع الصور (JPG، PNG، WebP)';
      setTimeout(() => { closePublishForm(); loadListings(); }, 2500);

    } catch (err) {
      console.error('[Publish] Error:', err);
      showPublishMsg('❌ حدث خطأ: ' + (err.message || 'حاول مجدداً'), 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane"></i> نشر الإعلان';
    }
  }

  function showPublishMsg(msg, type) {
    const el = document.getElementById('publishMsg');
    if (!el) return;
    el.textContent = msg;
    el.style.display = 'block';
    const colors = {
      success: ['rgba(0,255,195,0.15)', '#00ffc3', 'rgba(0,255,195,0.3)'],
      info:    ['rgba(0,150,255,0.15)', '#74b9ff', 'rgba(0,150,255,0.3)'],
      error:   ['rgba(255,71,87,0.15)', '#ff4757', 'rgba(255,71,87,0.3)']
    };
    const [bg, color, border] = colors[type] || colors.error;
    el.style.background = bg;
    el.style.color = color;
    el.style.border = `1px solid ${border}`;
  }

  // ─── Keyboard / Click outside ────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.getElementById('reModalOverlay').classList.remove('active');
      closePublishForm();
      document.body.style.overflow = '';
    }
  });

  document.addEventListener('click', e => {
    const langMenu = document.getElementById('languageMenu');
    const langBtn = document.querySelector('.lang-btn');
    if (langMenu && langMenu.classList.contains('show')) {
      if (!langMenu.contains(e.target) && langBtn && !langBtn.contains(e.target)) {
        langMenu.classList.remove('show');
      }
    }
  });

  // ─── Translation Observer ────────────────────────────────────
  if (window.translationManager) {
    window.translationManager.addObserver(() => {
      renderListings();
      updateCount();
    });
  }

  // ─── Init ─────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', loadListings);
  </script>
</body>
</html>
