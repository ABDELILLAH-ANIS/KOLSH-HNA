<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري المصادقة - كلش هنا</title>
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Gumela&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <style>
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            background: var(--bg-color, #121212);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0, 255, 195, 0.2);
            border-top-color: #00ffc3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status-text {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        .error-text {
            color: #ff4757;
            display: none;
            margin-bottom: 20px;
        }
        .action-btn {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="spinner" id="spinner"></div>
        <div class="status-text" id="statusText">جاري تسجيل الدخول عبر Google...</div>
        <div class="error-text" id="errorText">حدث خطأ أثناء المصادقة</div>
        <button class="action-btn" id="returnBtn" onclick="window.location.href='index.html'">العودة للصفحة الرئيسية</button>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/auth-callback.js"></script>
</body>
</html>
